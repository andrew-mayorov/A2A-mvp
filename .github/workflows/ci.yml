name: ci

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy src/sber_a2a
      - run: uv run pytest --cov=sber_a2a --cov-report=term-missing
      - run: uv run pip-audit
      - run: uv run bandit -c pyproject.toml -r src

  frontend:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm audit --audit-level=high

  supply-chain:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: docker compose config --quiet
      - run: docker compose build
      - uses: aquasecurity/trivy-action@0.32.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json

  compose-smoke:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: docker compose up --build --detach --wait
      - run: curl --fail http://127.0.0.1:8100/ready
      - run: curl --fail http://127.0.0.1:8000/ready
      - run: curl --fail http://127.0.0.1:8080/health
      - if: always()
        run: docker compose logs --no-color
      - if: always()
        run: docker compose down --volumes
