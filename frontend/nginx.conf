server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://a1:8100;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 60s;
    }

    location = /health {
        proxy_pass http://a1:8100/health;
    }

    location /docs {
        proxy_pass http://a1:8100;
    }

    location /openapi.json {
        proxy_pass http://a1:8100;
    }

    location /trust/ {
        rewrite ^/trust/(.*)$ /$1 break;
        proxy_pass http://trust-api:8000;
        proxy_http_version 1.1;
        proxy_buffering off;
    }

    location / {
        try_files $uri /index.html;
    }
}
